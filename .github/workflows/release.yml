# Publishes GitHub Release binaries (linux/darwin, amd64/arm64) via GoReleaser.
#
# Homebrew (optional):
# 1. Create an empty public repo: github.com/BestDevSpace/homebrew-tap (one-time).
# 2. In this repo: Settings → Secrets → Actions → add HOMEBREW_TAP_GITHUB_TOKEN
#    (classic PAT with repo scope, or fine-grained token with contents write on homebrew-tap).
# 3. If the secret is omitted, releases still run; only the brew tap push is skipped.
#    After the tap exists: brew tap BestDevSpace/tap && brew install linkstatus
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: GoReleaser (release only, skip Homebrew tap)
        if: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN == '' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=brew
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: GoReleaser (release + push formula to homebrew-tap)
        if: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
