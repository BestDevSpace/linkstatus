# Publishes GitHub Release binaries (linux/darwin, amd64/arm64) via GoReleaser.
#
# Homebrew (optional):
# 1. Create an empty public repo: github.com/BestDevSpace/homebrew-tap (one-time).
# 2. In this repo: Settings → Secrets → Actions → add HOMEBREW_TAP_GITHUB_TOKEN
#    (classic PAT with repo scope, or fine-grained token with contents write on homebrew-tap).
# 3. If the secret is omitted, releases still run; only the brew tap push is skipped.
#    After the tap exists: brew tap BestDevSpace/tap && brew install linkstatus
#
# Note: secrets.* cannot be used in step `if:` on some runners; we branch via a shell step instead.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set GoReleaser args (skip brew if no tap token)
        id: goreleaser_args
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -n "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "args=release --clean" >> "$GITHUB_OUTPUT"
          else
            echo "args=release --clean --skip=brew" >> "$GITHUB_OUTPUT"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ steps.goreleaser_args.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
