# Publishes GitHub Release binaries (linux/darwin, amd64/arm64) via GoReleaser.
#
# Homebrew tap (optional) — secret lives in *this* repo; token must write to *homebrew-tap*:
# 1. Create github.com/BestDevSpace/homebrew-tap (e.g. empty repo, default branch main).
# 2. linkstatus → Settings → Secrets and variables → Actions → New repository secret:
#    HOMEBREW_TAP_GITHUB_TOKEN
#
#    Fine-grained PAT (common 403 if misconfigured):
#    - Resource owner: BestDevSpace (user or org).
#    - Repository access: MUST include homebrew-tap (not only linkstatus). GoReleaser
#      calls the Contents API on homebrew-tap; a token limited to linkstatus gets 403.
#    - Permissions: Contents = Read and write, Metadata = Read.
#    - If the org uses SSO: authorize the token for the org.
#
#    Classic PAT: scope "repo", and the account must have push access to homebrew-tap.
#
# 3. Omit the secret to skip tap updates (release still publishes GitHub release assets).
#    Install: brew tap BestDevSpace/tap && brew install --cask linkstatus
#
# Note: secrets.* cannot be used in step `if:` on some runners; we branch via a shell step instead.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set GoReleaser args (skip brew if no tap token)
        id: goreleaser_args
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -n "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "args=release --clean" >> "$GITHUB_OUTPUT"
          else
            echo "args=release --clean --skip=homebrew" >> "$GITHUB_OUTPUT"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ steps.goreleaser_args.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
